<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Maison Mataha — Escapade Gourmande · TikTok ASMR</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@400;500;600;700&display=swap"/>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #0a0604; font-family: 'Inter', system-ui, sans-serif; color: #f5ede0; }
  body { overflow-x: hidden; }
  #root { min-height: 100vh; }
  .page-bg {
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 80% 60% at 30% 20%, rgba(196, 142, 56, 0.18), transparent 60%),
      radial-gradient(ellipse 90% 70% at 75% 85%, rgba(120, 70, 22, 0.20), transparent 60%),
      #0a0604;
  }
  .page-grain {
    position: fixed; inset: 0; z-index: -1; opacity: 0.06; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  header.brand {
    text-align: center;
    padding: 64px 24px 32px;
  }
  header.brand .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.6em; text-indent: 0.6em;
    text-transform: uppercase;
    color: #c8984e;
    margin-bottom: 14px;
  }
  header.brand .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px; font-weight: 400;
    letter-spacing: 0.42em; text-indent: 0.42em;
    text-transform: uppercase;
    color: #f5ede0;
    line-height: 1;
  }
  header.brand .tagline {
    margin-top: 18px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 26px;
    color: rgba(245, 237, 224, 0.78);
  }
  header.brand .meta {
    margin-top: 10px;
    font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(245, 237, 224, 0.5);
  }
  .variant-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 40px;
    padding: 24px 32px 96px;
    align-items: flex-start;
  }
  .variant {
    display: flex; flex-direction: column; align-items: center;
    width: 360px;
  }
  .variant .label {
    margin-bottom: 14px;
    text-align: center;
  }
  .variant .label .key {
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.4em; text-indent: 0.4em;
    text-transform: uppercase;
    color: #c8984e;
    margin-bottom: 6px;
  }
  .variant .label .desc {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: #f5ede0;
    line-height: 1.2;
  }
  .variant .open-link {
    margin-top: 10px;
    display: inline-block;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.28em; text-indent: 0.28em;
    text-transform: uppercase;
    color: rgba(245, 237, 224, 0.65);
    text-decoration: none;
    border-bottom: 1px solid rgba(200, 152, 78, 0.4);
    padding-bottom: 2px;
  }
  .variant .open-link:hover { color: #f5ede0; border-bottom-color: #c8984e; }
  .phone-frame {
    width: 360px;
    aspect-ratio: 9 / 16;
    background: #000;
    border-radius: 32px;
    box-shadow:
      0 1px 0 rgba(255, 230, 180, 0.05) inset,
      0 30px 60px rgba(0, 0, 0, 0.55),
      0 8px 24px rgba(0, 0, 0, 0.4),
      0 0 0 2px rgba(200, 152, 78, 0.18);
    overflow: hidden;
    position: relative;
  }
  .phone-frame .stage-host {
    position: absolute; inset: 0;
  }
  footer.foot {
    text-align: center;
    padding: 0 24px 56px;
    color: rgba(245, 237, 224, 0.45);
    font-size: 13px;
    letter-spacing: 0.15em;
  }
  footer.foot a {
    color: #c8984e;
    text-decoration: none;
    border-bottom: 1px solid rgba(200, 152, 78, 0.4);
  }
  @media (max-width: 720px) {
    header.brand { padding: 40px 16px 16px; }
    header.brand .name { font-size: 30px; }
    header.brand .tagline { font-size: 20px; }
    .variant, .phone-frame { width: 320px; }
    .variant-grid { gap: 32px; padding: 16px 16px 64px; }
  }
</style>
</head>
<body>
<div class="page-bg"></div>
<div class="page-grain"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel" src="videos.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [muted, setMuted] = React.useState(true);
  const onToggleMute = () => {
    setMuted(m => {
      const next = !m;
      if (window.MahatahSoundInstance) {
        window.MahatahSoundInstance.unlock();
        window.MahatahSoundInstance.setMuted(next);
      }
      return next;
    });
  };

  const variants = [
    { id: 'A', href: 'a.html', desc: 'ASMR Hero — zoom + ingrédients rythmés', Comp: VideoA },
    { id: 'B', href: 'b.html', desc: 'Reveal — flacon clean → spray éclate',  Comp: VideoB },
    { id: 'C', href: 'c.html', desc: 'Editorial dark — 3 sprays cinématiques', Comp: VideoC },
  ];

  return (
    <React.Fragment>
      <header className="brand">
        <div className="eyebrow">Maison</div>
        <div className="name">Mataha</div>
        <div className="tagline">Escapade Gourmande</div>
        <div className="meta">TikTok · 9:16 · 14 s · ASMR sensoriel</div>
      </header>

      <div className="variant-grid">
        {variants.map(v => (
          <div className="variant" key={v.id}>
            <div className="label">
              <div className="key">Variation {v.id}</div>
              <div className="desc">{v.desc}</div>
            </div>
            <div className="phone-frame">
              <div className="stage-host">
                <v.Comp muted={muted} onToggleMute={onToggleMute}/>
              </div>
            </div>
            <a className="open-link" href={v.href} target="_blank" rel="noopener noreferrer">Ouvrir en plein écran ↗</a>
          </div>
        ))}
      </div>

      <footer className="foot">
        ✦ Découvrir nos parfums sur <a href="https://www.planetebeauty.com" target="_blank" rel="noopener noreferrer">www.planetebeauty.com</a> ✦
      </footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
